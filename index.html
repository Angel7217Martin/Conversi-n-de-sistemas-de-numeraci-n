<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas de Numeración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="converter-container">
        <header>
            <h2>Conversor Web</h2>
            <p class="subtitle">Sistemas Numéricos</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <label for="sistema">Base Origen</label>
                <div class="custom-select">
                    <select id="sistema">
                        <option value="10">Decimal (10)</option>
                        <option value="2">Binario (2)</option>
                        <option value="8">Octal (8)</option>
                        <option value="16">Hexadecimal (16)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="numero">Número</label>
                <input type="text" id="numero" placeholder="Ej. 1A4" autocomplete="off">
                <span class="error-msg">Inválido para esta base</span>
            </div>

            <button id="btnConvertir" class="btn-primary">
                Convertir &rarr;
            </button>
        </section>

        <section class="results-section" id="resultados">
            <div class="placeholder-text">Los resultados aparecerán aquí.</div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
